<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHEON · Cyber Security Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --green: #00ff41;
      --green-dim: #00cc33;
      --green-dark: #004d14;
      --green-glow: rgba(0, 255, 65, 0.4);
      --green-subtle: rgba(0, 255, 65, 0.08);
      --bg-base: #060810;
      --bg-raised: #0b0e17;
      --bg-elevated: #111520;
      --card-bg: #0d1020;
      --border-faint: rgba(0, 255, 65, 0.2);
      --border-vivid: rgba(0, 255, 65, 0.6);
      --text-primary: #c8f0d4;
      --text-muted: #6a8a72;
      --danger: #ff4141;
      --accent-cyan: #00f5ff;
      --accent-amber: #ffb800;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0, 255, 65, 0.018) 3px, rgba(0, 255, 65, 0.018) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

 
    body::after {
      content: "";
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    ::selection { background: var(--green); color: var(--bg-base); }
    ::-webkit-scrollbar { width: 6px; background: var(--bg-base); }
    ::-webkit-scrollbar-track { background: var(--bg-raised); }
    ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 3px; }


    #splashOverlay {
      position: fixed; inset: 0;
      background: #000;
      z-index: 10000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }
    #splashOverlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    #matrixCanvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    .splash-card {
      position: relative; z-index: 10;
      text-align: center;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid var(--green);
      border-radius: 4px;
      padding: 3rem 4rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 60px rgba(0,255,65,0.15), inset 0 0 40px rgba(0,255,65,0.04);
      animation: cardBreath 3s ease-in-out infinite;
    }

    @keyframes cardBreath {
      0%, 100% { box-shadow: 0 0 60px rgba(0,255,65,0.15), inset 0 0 40px rgba(0,255,65,0.04); }
      50%       { box-shadow: 0 0 100px rgba(0,255,65,0.3), inset 0 0 60px rgba(0,255,65,0.08); }
    }

    .splash-card .academy-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: 12px;
      color: var(--green);
      text-shadow: 0 0 30px var(--green), 0 0 60px var(--green-glow);
      margin-bottom: 0.5rem;
    }

    .splash-card .academy-sub {
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 3px;
      margin-bottom: 2rem;
    }

    .typing-output {
      font-family: 'Share Tech Mono', monospace;
      color: var(--green);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      min-height: 1.4rem;
      white-space: pre-line;
    }

    .cursor-blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    #enterAcademyBtn {
      font-family: 'Orbitron', monospace;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 12px 36px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 4px;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    #enterAcademyBtn::before {
      content: "";
      position: absolute; inset: 0;
      background: var(--green);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: -1;
    }
    #enterAcademyBtn:hover::before { transform: scaleX(1); }
    #enterAcademyBtn:hover { color: var(--bg-base); box-shadow: 0 0 20px var(--green); }

    #appRoot { position: relative; z-index: 1; }

    .page-wrapper { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem; }

    /* sticky nav — had to bump z-index after the quiz modal got in the way */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1rem 2rem;
      background: rgba(6, 8, 16, 0.9);
      border-bottom: 1px solid var(--border-faint);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 500;
    }

    .brand-wrap { display: flex; align-items: center; gap: 12px; cursor: pointer; }

    .brand-icon {
      width: 48px; height: 48px;
      border: 1px solid var(--green);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 255, 65, 0.05);
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.2);
      overflow: hidden;
      flex-shrink: 0;
    }
    .brand-icon img { width: 100%; height: 100%; object-fit: contain; }

    .brand-name {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--green);
      letter-spacing: 3px;
      text-shadow: 0 0 12px var(--green-glow);
    }
    .brand-tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-actions { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

 
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.25s;
      letter-spacing: 0.5px;
      border: none;
      font-size: 0.875rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green), var(--green-dim));
      color: var(--bg-base);
      padding: 8px 20px;
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
    }
    .btn-primary:hover {
      box-shadow: 0 0 20px var(--green-glow), 0 0 6px var(--green);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-vivid);
      color: var(--green);
      padding: 7px 18px;
    }
    .btn-outline:hover { background: rgba(0, 255, 65, 0.08); box-shadow: 0 0 10px var(--green-glow); }

    .btn-danger-ghost {
      background: transparent;
      border: 1px solid rgba(255, 65, 65, 0.5);
      color: var(--danger);
      padding: 7px 18px;
    }
    .btn-danger-ghost:hover { background: rgba(255, 65, 65, 0.1); box-shadow: 0 0 10px rgba(255,65,65,0.3); }

    .btn-sm { padding: 5px 14px; font-size: 0.8rem; }

    .logged-in-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--green);
      background: rgba(0, 255, 65, 0.06);
      border: 1px solid var(--border-faint);
      border-radius: 3px;
      padding: 6px 12px;
    }


    .dashboard-stats {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      background: var(--bg-raised);
      border: 1px solid var(--border-faint);
      border-radius: 4px;
      margin: 1.5rem 0;
      overflow: hidden;
    }

    .stat-item {
      flex: 1;
      min-width: 120px;
      padding: 0.9rem 1.5rem;
      border-right: 1px solid var(--border-faint);
      text-align: center;
    }
    .stat-item:last-child { border-right: none; }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 8px var(--green-glow);
    }
    .stat-desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(-);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .xp-bar-track {
      height: 3px;
      background: rgba(0, 255, 65, 0.1);
      border-radius: 2px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 8px var(--green);
    }


    .courses-heading {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .courses-heading::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-fain);
    }


    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 2.5rem;
    }

    .course-card {
      background: var(--card-bg);
      border: 1px solid var(--border-faint);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2),
                  border-color 0.3s,
                  box-shadow 0.3s;
      position: relative;
    }
    /* just a shadow*/
    .course-card::before { 
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,255,65,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .course-card:hover::before { opacity: 1; }

    .course-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--green);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,65,0.15);
    }

    /* dim siblings on hover — gives a nice "spotlight" feel */
    .course-grid:hover .course-card:not(:hover) {
      filter: brightness(0.65);
      transform: scale(0.98);
    }

    .card-thumbnail {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: var(--bg-elevated);
    }

    .course-type-badge {
      position: absolute;
      top: 10px; right: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 2px;
      background: rgba(0, 0, 0, 0.8);
      color: var(--green);
      border: 1px solid var(--border-faint);
      border-radius: 2px;
      padding: 3px 8px;
    }

    .completion-checkmark {
      position: absolute;
      top: 10px; left: 10px;
      width: 26px; height: 26px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      color: var(--bg-base);
      font-weight: 900;
    }

    .card-content { padding: 1rem 1.2rem 1.2rem; }
    .card-icon { font-size: 1.3rem; margin-bottom: 6px; }

    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0ffe8;
      margin-bottom: 4px;
    }
    .card-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    /*card buttom button*/
    .card-cta {
      width: 100%;
      background: linear-gradient(135deg, var(--green), var(--green-dim));
      border: none;
      color: var(--bg-base);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
      padding: 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .card-cta:hover { box-shadow: 0 0 14px var(--green-glow); transform: translateY(-1px); }


    .vault-cta-wrap {
      display: flex;
      justify-content: center;
      margin: 1rem 0 3rem;
    }

    .vault-btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 3px;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 14px 40px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
    }
    .vault-btn::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,255,65,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .vault-btn:hover::before { opacity: 1; }
    .vault-btn:hover { box-shadow: 0 0 25px rgba(0,255,65,0.3); transform: translateY(-2px); }

    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 10px;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,65,0.7); }
      50%       { box-shadow: 0 0 0 6px rgba(0,255,65,0); }
    }


    /* ── Search Section ── */
    .search-section {
      margin: 1.5rem 0 0.5rem;
    }

    .search-wrapper {
      background: var(--bg-raised);
      border: 1px solid var(--border-faint);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
    }

    .search-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0.8rem;
    }
   /*spy glaass*/
    .search-header i {
      color: var(--green);
      font-size: 0.85rem;
    }

    .search-header h3 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: normal;
    }

    .search-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-input-wrapper {
      position: relative;
      flex: 1;
      min-width: 180px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.8rem;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-faint);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      padding: 9px 12px 9px 34px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #searchInput:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(0,255,65,0.2);
    }
    #searchInput::placeholder { color: var(--text-muted); }

    .search-filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #categorySelect {
      background: var(--bg-elevated);
      border: 1px solid var(--border-faint);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      padding: 9px 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #categorySelect:focus { border-color: var(--green); }

    .search-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--green), var(--green-dim));
      border: none;
      border-radius: 4px;
      color: var(--bg-base);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 1px;
      padding: 9px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .search-btn:hover {
      box-shadow: 0 0 14px var(--green-glow);
      transform: translateY(-1px);
    }

    .search-results-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-top: 0.5rem;
    }

    .search-results-count span { color: var(--green); }

   
    .lesson-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .breadcrumb {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .breadcrumb span { color: var(--green); }

    .lesson-reader {
      background: var(--card-bg);
      border: 1px solid var(--border-faint);
      border-radius: 8px;
      padding: 2rem 2.5rem;
      margin-top: 1rem;
    }

    .lesson-reader h2 {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 10px var(--green-glow);
      margin-bottom: 1.2rem;
      line-height: 1.4;
    }
    .lesson-reader h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-cyan);
      margin: 1.5rem 0 0.6rem;
    }
    .lesson-reader p { line-height: 1.8; color: var(--text-primary); margin-bottom: 1rem; font-size: 1rem; }

    .lesson-reader pre {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-faint);
      border-left: 3px solid var(--green);
      border-radius: 4px;
      padding: 1.2rem 1.5rem;
      margin: 1rem 0;
      overflow-x: auto;
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .activity-prompt {
      background: rgba(0, 255, 65, 0.04);
      border: 1px solid var(--border-faint);
      border-left: 3px solid var(--green);
      border-radius: 4px;
      padding: 1rem 1.2rem;
      margin: 1rem 0;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .img-frame {
      background: var(--bg-elevated);
      border: 1px dashed var(--border-vivid);
      border-radius: 8px;
      padding: 1rem;
      margin: 1.5rem 0;
      text-align: center;
    }
    .img-frame img { max-width: 100%; max-height: 200px; border-radius: 6px; object-fit: contain; }
    .img-frame p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .lesson-pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-faint);
      gap: 1rem;
    }
    .page-position {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }


    /* ── See More Section ── */
    .see-more-section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-faint);
    }
    .see-more-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }
    .see-more-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .see-more-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 4px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 0.875rem; letter-spacing: 0.5px;
      cursor: pointer; text-decoration: none; transition: all 0.25s;
    }
    .see-more-btn.coursera { background: transparent; border: 1px solid #0056D2; color: #4d9fff; }
    .see-more-btn.coursera:hover { background: rgba(0,86,210,0.12); box-shadow: 0 0 14px rgba(0,86,210,0.3); transform: translateY(-1px); }
    .see-more-btn.w3schools { background: transparent; border: 1px solid #04aa6d; color: #04aa6d; }
    .see-more-btn.w3schools:hover { background: rgba(4,170,109,0.1); box-shadow: 0 0 14px rgba(4,170,109,0.3); transform: translateY(-1px); }
    .see-more-btn.mdn { background: transparent; border: 1px solid #ff6a00; color: #ff9f5a; }
    .see-more-btn.mdn:hover { background: rgba(255,106,0,0.1); box-shadow: 0 0 14px rgba(255,106,0,0.3); transform: translateY(-1px); }

    /* ── Comments Section ── */
    .comments-section {
      margin-top: 2.5rem;
      background: var(--bg-raised);
      border: 1px solid var(--border-faint);

<script>

(function() {
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const glyphSet = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
  const FONT_SIZE = 14;
  let columns = [];

  function initColumns() {
    const count = Math.floor(canvas.width / FONT_SIZE);
    columns = Array(count).fill(1);
  }
  initColumns();
  window.addEventListener('resize', initColumns);

  function drawRain() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < columns.length; i++) {
      const glyph = glyphSet[Math.floor(Math.random() * glyphSet.length)];
      const x = i * FONT_SIZE;
      const y = columns[i] * FONT_SIZE;
      const brightness = Math.random();

     
      if (brightness > 0.98)       ctx.fillStyle = '#ffffff';
      else if (brightness > 0.7)   ctx.fillStyle = '#00ff41';
      else                          ctx.fillStyle = '#008f11';

      ctx.font = `${FONT_SIZE}px 'Share Tech Mono', monospace`;
      ctx.fillText(glyph, x, y);

      if (y > canvas.height && Math.random() > 0.975) columns[i] = 0;
      columns[i]++;
    }
  }

  const rainInterval = setInterval(drawRain, 45); 

  
  const bootMessages = [
    '> Initializing SHEON Academy...',
    '> Loading threat intelligence modules...',
    '> Ready when you are.'
  ];
  let lineIdx = 0, charIdx = 0, buffer = '';
  const outputEl = document.getElementById('typingOutput');

  function typeChar() {
    if (lineIdx >= bootMessages.length) {
      outputEl.innerHTML = '> <span class="cursor-blink">▌</span>';
      return;
    }
    if (charIdx < bootMessages[lineIdx].length) {
      buffer += bootMessages[lineIdx][charIdx++];
      outputEl.innerHTML = buffer + '<span class="cursor-blink">▌</span>';
      setTimeout(typeChar, 38);
    } else {
      buffer += '\n';
      lineIdx++;
      charIdx = 0;
      setTimeout(typeChar, 600);
    }
  }
  setTimeout(typeChar, 400);

  document.getElementById('enterAcademyBtn').addEventListener('click', () => {
    clearInterval(rainInterval);
    document.getElementById('splashOverlay').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('splashOverlay').style.display = 'none';
    }, 1300);
  });
})();

    dot.style.width = dot.style.height = (Math.random() * 3 + 1) + 'px';
    document.body.appendChild(dot);
  }
})();


let _toastTimeout;
function showToast(msg, isError = false) {
  const el = document.getElementById('toastMsg');
  el.textContent = msg;
  el.className = isError ? 'is-error visible' : 'visible';
  clearTimeout(_toastTimeout);
  _toastTimeout = setTimeout(() => { el.className = ''; }, 3200);
}


let currentUser = JSON.parse(localStorage.getItem('sh_usr')) || null;
let registeredUsers = JSON.parse(localStorage.getItem('sh_usrs')) || [];

function saveUsers() { localStorage.setItem('sh_usrs', JSON.stringify(registeredUsers)); }
function saveSession() { localStorage.setItem('sh_usr', JSON.stringify(currentUser)); }

function logout() {
  currentUser = null;
  localStorage.removeItem('sh_usr');
  sessionProgress = { completed: [], points: 0, quizScores: {} };
  showToast('> Logged out. See you next time!');
  renderHome();
}


let sessionProgress = { completed: [], points: 0, quizScores: {} };

function loadProgress() {
  sessionProgress = currentUser?.progress ?? { completed: [], points: 0, quizScores: {} };
}

function syncProgress() {
  if (!currentUser) return;
  currentUser.progress = sessionProgress;
  saveSession();
  const idx = registeredUsers.findIndex(u => u.email === currentUser.email);
  if (idx !== -1) {
    registeredUsers[idx].progress = sessionProgress;
    saveUsers();
  }
}

function awardXP(pts, lessonId, quizScore = null) {
  sessionProgress.points += pts;
  if (!sessionProgress.completed.includes(lessonId)) {
    sessionProgress.completed.push(lessonId);
  }
  if (quizScore !== null) sessionProgress.quizScores[lessonId] = quizScore;
  syncProgress();
}

      <p>Semantic elements — <code>&lt;header&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;footer&gt;</code>, <code>&lt;article&gt;</code>, <code>&lt;nav&gt;</code> — tell browsers and assistive tech what your content <em>means</em>, not just how it looks. ARIA roles fill the gaps where native semantics aren't expressive enough.</p>
      <pre><code>&lt;header role="banner"&gt;
  &lt;h1&gt;SHEON Academy&lt;/h1&gt;
&lt;/header&gt;
&lt;main role="main"&gt;
  &lt;article&gt;
    &lt;h2&gt;Lesson Title&lt;/h2&gt;

  &lt;/article&gt;
&lt;/main&gt;</code></pre>

      <div class="activity-prompt">🏗️ Take a div-heavy HTML page and rewrite it using proper semantic HTML5 elements. Run it through a screen reader to verify.</div>`,

      <p>Client-side validation improves UX — but it's cosmetic. Real security lives server-side. Never trust user input, ever. The single most important rule: use <code>textContent</code> to insert dynamic content, not <code>innerHTML</code>. One slip there is all an XSS attack needs.</p>
      <pre><code>// safe — just text, no HTML parsing
element.textContent = userInput;

// dangerous — don't do this with untrusted data
element.innerHTML = userInput;</code></pre>
      <div class="img-frame"><img src="html1.jpg" alt="XSS prevention"><p>html1.jpg — XSS attack vectors and safe DOM insertion</p></div>
      <div class="activity-prompt">📬 Build a contact form with client-side validation (constraint API) and simulate a server-side sanitization layer. Then try to XSS it.</div>`

  css: {

      <p>Two core categories: <strong>symmetric encryption</strong> (same key both ways — fast, great for bulk data) and <strong>asymmetric encryption</strong> (public/private key pair — slower, but solves the key-distribution problem). In practice: AES-256 for symmetric, RSA-2048 or ECC for asymmetric.</p>

function getComments(lessonId) {
  try {
    const stored = JSON.parse(localStorage.getItem('sh_comments_' + lessonId));
    if (stored && stored.length) return stored;
    // first visit — seed with defaults
    const defaults = defaultComments[lessonId] || [];
    if (defaults.length) saveComments(lessonId, defaults);
    return defaults;
  } catch { return defaultComments[lessonId] || []; }
}
function saveComments(lessonId, comments) {
  localStorage.setItem('sh_comments_' + lessonId, JSON.stringify(comments));
}

              <span data-val="3">★</span>

              <span data-val="5">★</span>
            </div>
            <button class="post-comment-btn" id="postCommentBtn">Post Comment →</button>
          </div>
        </div>
        <div class="comments-list" id="commentsList"></div>
      </div>
    </div>`;

  // ── star rating logic ──
  let selectedStars = 0;
  const stars = document.querySelectorAll('#starRating span');
  stars.forEach(star => {
    star.addEventListener('mouseenter', () => {
      const val = +star.dataset.val;
      stars.forEach(s => s.classList.toggle('active', +s.dataset.val <= val));
    });
    star.addEventListener('mouseleave', () => {
      stars.forEach(s => s.classList.toggle('active', +s.dataset.val <= selectedStars));
    });
    star.addEventListener('click', () => {
      selectedStars = +star.dataset.val;
      stars.forEach(s => s.classList.toggle('active', +s.dataset.val <= selectedStars));
    });
  });

  function renderCommentsList() {
    const list = document.getElementById('commentsList');
    const comments = getComments(activeLesson);
    if (!comments.length) {

      return;

    list.innerHTML = comments.map(c => {
      const initials = c.author ? c.author.substring(0, 2).toUpperCase() : '??';
      const stars = '★'.repeat(c.stars || 0) + '☆'.repeat(5 - (c.stars || 0));

            <span class="comment-date">${c.date || ''}</span>
          </div>
          <div class="comment-body">${c.text}</div>
        </div>`;
    }).join('');
  }
  renderCommentsList();

  // ── post comment ──
  document.getElementById('postCommentBtn').addEventListener('click', () => {
    const text = document.getElementById('commentText').value.trim();
    if (!text) { showToast('Write something before posting!', true); return; }
    const author = currentUser ? currentUser.email.split('@')[0] : 'Guest_' + Math.floor(Math.random()*9000+1000);
    const now = new Date();
    const date = now.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
    const comments = getComments(activeLesson);
    comments.unshift({ author, text, stars: selectedStars, date });
    saveComments(activeLesson, comments);
    document.getElementById('commentText').value = '';
    selectedStars = 0;
    stars.forEach(s => s.classList.remove('active'));
    renderCommentsList();
    showToast('> Comment posted!');
  });
}

function prevLessonPage() {

    window.scrollTo({ top: 0, behavior: 'smooth' });

}

        <div class="quiz-heading">📝 my QUIZ: ${lesson.name}</div>
        <div id="quizBody"></div>
        <div class="quiz-footer">
          <button class="btn btn-primary" id="submitQuizBtn">Submit & Earn Points</button>
          <button class="btn btn-outline" id="backToLessonBtn">← Back to Content</button>
        </div>
      </div>
    </div>`;


  const quizBody = document.getElementById('quizBody');
  questions.forEach((q, qi) => {
    const block = document.createElement('div');
    block.className = 'quiz-question-block';
    block.innerHTML = `<div class="question-text">${qi + 1}. ${q.question}</div>`;
    q.options.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'answer-option';
      label.innerHTML = `<input type="radio" name="q${qi}" value="${oi}"> ${opt}`;
      block.appendChild(label);
    });
    quizBody.appendChild(block);
  });

  document.getElementById('submitQuizBtn').onclick = () => {
    let score = 0;
    for (let i = 0; i < questions.length; i++) {
      const selected = document.querySelector(`input[name="q${i}"]:checked`);
      if (selected && parseInt(selected.value) === questions[i].correct) score++;
    }

    const passMark = Math.ceil(questions.length / 2);
    if (score >= passMark) {
      awardXP(50, activeLesson, score);
      showToast(`✅ Passed! ${score}/${questions.length} correct · +50 XP earned`);
      setTimeout(renderHome, 1000);
    } else {
      showToast(`${score}/${questions.length} correct — need ${passMark} to pass. Give it another shot!`, true);
    }
  };

  document.getElementById('backToLessonBtn').onclick = () => {
    quizMode = false;
    renderLessonPage();
  };
}

        </div>`;
    }).join('');
  }

  // initial render — all courses
  renderCards(allLessons);

  // ── search / filter logic ──
  function applySearch() {
    const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    const cat   = (document.getElementById('categorySelect').value || 'all').toLowerCase();

    const filtered = allLessons.filter(lesson => {
      const haystack = (lesson.name + ' ' + (lesson.tags || '') + ' ' + (lesson.category || '') + ' ' + lesson.id).toLowerCase();
      const matchQuery = !query || haystack.includes(query);
      // category values now match lesson IDs exactly — direct match first, fallback to name search
      const matchCat   = cat === 'all' || lesson.id === cat || haystack.includes(cat);
      return matchQuery && matchCat;
    });

    renderCards(filtered);
  }

  // hook up button and live-search on Enter / input
  const searchBtn = document.getElementById('searchBtn');
  const searchInput = document.getElementById('searchInput');
  const categorySelect = document.getElementById('categorySelect');

  if (searchBtn)      searchBtn.addEventListener('click', applySearch);
  if (searchInput)    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') applySearch(); });
  if (categorySelect) categorySelect.addEventListener('change', applySearch);
}

function renderMasterExam() {
  document.getElementById('appRoot').innerHTML = `
    ${buildHeader()}

        <div class="breadcrumb">HOME / <span>MASTER EXAM</span></div>

          <button class="btn btn-primary" id="submitMasterBtn">⚡ Submit Exam</button>
          <button class="btn btn-outline" onclick="renderHome()">← Cancel</button>
        </div>
      </div>
    </div>`;

  const body = document.getElementById('masterQuizBody');
  masterExamQuestions.forEach((q, qi) => {
    const block = document.createElement('div');
    block.className = 'quiz-question-block';
    block.innerHTML = `
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--text-muted);letter-spacing:2px;margin-bottom:6px;">
        TOPIC: ${q.topic} &nbsp;·&nbsp; Q${qi + 1}/30
      </div>
      <div class="question-text">${qi + 1}. ${q.question}</div>`;
    q.options.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'answer-option';
      label.innerHTML = `<input type="radio" name="mq${qi}" value="${oi}"> ${opt}`;
      block.appendChild(label);
    });
    body.appendChild(block);
  });

  document.getElementById('submitMasterBtn').onclick = () => {
    // check all answered
    let unanswered = [];
    for (let i = 0; i < masterExamQuestions.length; i++) {
      if (!document.querySelector(`input[name="mq${i}"]:checked`)) unanswered.push(i + 1);
    }
    if (unanswered.length > 0) {
      showToast(`⚠ Unanswered: Q${unanswered.slice(0,5).join(', ')}${unanswered.length > 5 ? '…' : ''}`, true);
      // scroll to first unanswered
      const blocks = document.querySelectorAll('.quiz-question-block');
      if (blocks[unanswered[0] - 1]) blocks[unanswered[0] - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    let score = 0;
    const wrongTopics = {};
    masterExamQuestions.forEach((q, i) => {
      const sel = document.querySelector(`input[name="mq${i}"]:checked`);
      if (sel && parseInt(sel.value) === q.correct) {
        score++;
      } else {
        wrongTopics[q.topic] = (wrongTopics[q.topic] || 0) + 1;
      }
    });

    const pct = Math.round((score / 30) * 100);
    let grade, gradeClass, emoji, msg;
    if (pct >= 93)      { grade = 'S — ELITE';    gradeClass = 'grade-s'; emoji = '🏆'; msg = 'Outstanding. You have mastered every domain.'; }
    else if (pct >= 80) { grade = 'A — ADVANCED'; gradeClass = 'grade-a'; emoji = '🛡️'; msg = 'Excellent work. You are ready for real-world challenges.'; }
    else if (pct >= 67) { grade = 'B — SOLID';    gradeClass = 'grade-b'; emoji = '💡'; msg = 'Good foundation. Review weak areas and retake to level up.'; }
    else if (pct >= 50) { grade = 'C — AVERAGE';  gradeClass = 'grade-c'; emoji = '⚠️'; msg = 'Passing, but there is clear room to grow. Study the weak topics below.'; }
    else                { grade = 'F — RETRY';    gradeClass = 'grade-f'; emoji = '💀'; msg = 'Go back through the courses and try again. You can do this.'; }

    const weakTopicsHTML = Object.keys(wrongTopics).length
      ? `<div style="margin:1.5rem 0;">
          <div style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text-muted);letter-spacing:3px;margin-bottom:0.8rem;">// TOPICS TO REVIEW //</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">

              `<span style="background:rgba(255,65,65,0.1);border:1px solid rgba(255,65,65,0.4);border-radius:4px;padding:6px 14px;font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:var(--danger);">
                ${t} — ${n} wrong

            ).join('')}
          </div>
        </div>`
      : `<div style="font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--green);letter-spacing:2px;margin:1rem 0;">// PERFECT — ZERO MISTAKES //</div>`;

    document.getElementById('appRoot').innerHTML = `
      ${buildHeader()}
      <div class="page-wrapper">
        <div class="lesson-topbar">
          <div class="breadcrumb">HOME / <span>MASTER EXAM</span> / <span>RESULTS</span></div>
          <button class="btn btn-outline btn-sm" onclick="renderHome()">← Home</button>
        </div>
        <div class="lesson-reader">
          <div class="master-result-panel">
            <div class="master-result-trophy">${emoji}</div>

            <div class="master-result-score">${score} / 30</div>
            <div class="master-result-sub">${pct}% ACCURACY</div>
            <div class="master-grade-badge ${gradeClass}">${grade}</div>

              <div class="breakdown-item">
                <div class="breakdown-val">${score}</div>
                <div class="breakdown-lbl">Correct</div>
              </div>
              <div class="breakdown-item">
                <div class="breakdown-val" style="color:var(--danger)">${30 - score}</div>
                <div class="breakdown-lbl">Wrong</div>
              </div>
              <div class="breakdown-item">
                <div class="breakdown-val">${pct}%</div>
                <div class="breakdown-lbl">Score</div>
              </div>
            </div>
            <p style="font-family:'Share Tech Mono',monospace;font-size:0.78rem;color:var(--text-muted);max-width:480px;margin:0 auto 1.5rem;line-height:1.8;">${msg}</p>
            ${weakTopicsHTML}
            <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem;">
              <button class="btn btn-primary" onclick="renderMasterExam()">🔄 Retake Exam</button>
              <button class="btn btn-outline" onclick="renderHome()">← Back to Courses</button>
            </div>
          </div>
        </div>
      </div>`;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

      </div>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.renderCertificate = renderCertificate;
window.renderMasterExam  = renderMasterExam;


// kick everything off
loadProgress();
renderHome();

// patch renderHome to always init tip + leaderboard
const _origRenderHome = renderHome;
window.renderHome = function() {
  _origRenderHome();
  setTimeout(() => { initDailyTip(); renderLeaderboard(); }, 0);
};
// run once now
setTimeout(() => { initDailyTip(); renderLeaderboard(); }, 0);
</script>
